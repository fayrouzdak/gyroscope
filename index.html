<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gyroscope</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="app">
      <div id="canvas-frame">
        <canvas id="canvas"></canvas>
        <div class="stats" id="stats"></div>

        <div id="panel">
          <div class="panel-box">
            <div class="toolbar" role="toolbar" aria-label="Simulation controls">
              <div class="toolbar-group toolbar-cta">
                <button id="spin" class="cta-btn primary" type="button">
                  <svg class="cta-btn-icon cta-btn-icon-spin" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                    <path
                      d="M7.65703 2.27884C6.49076 1.57201 5 2.41169 5 3.77543V20.2247C5 21.5884 6.49076 22.4281 7.65703 21.7213L21.2276 13.4966C22.3516 12.8155 22.3516 11.1846 21.2276 10.5035L7.65703 2.27884Z"
                      fill="currentColor"
                    />
                  </svg>
                  <svg class="cta-btn-icon cta-btn-icon-stop" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                    <path
                      d="M5.75 3C4.7835 3 4 3.7835 4 4.75V19.25C4 20.2165 4.7835 21 5.75 21H8.25C9.2165 21 10 20.2165 10 19.25V4.75C10 3.7835 9.2165 3 8.25 3H5.75Z"
                      fill="currentColor"
                    />
                    <path
                      d="M15.75 3C14.7835 3 14 3.7835 14 4.75V19.25C14 20.2165 14.7835 21 15.75 21H18.25C19.2165 21 20 20.2165 20 19.25V4.75C20 3.7835 19.2165 3 18.25 3H15.75Z"
                      fill="currentColor"
                    />
                  </svg>
                  <span class="cta-btn-label">Spin</span>
                </button>
                <button id="reset" class="cta-btn" type="button">Reset</button>
              </div>

              <div class="toolbar-divider" aria-hidden="true"></div>

              <div class="toolbar-group toolbar-icons">
                <div class="toolbar-popover" data-menu="simulation">
                  <div class="icon-btn" aria-label="Simulation settings" title="Simulation">
                    <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                      <path
                        d="M12.7822 2.46483C13.5944 1.53598 15.174 2.25894 14.9433 3.52343L13.8994 9.24999H17.7636C18.7873 9.2501 19.3766 10.4136 18.7714 11.2392L11.2939 21.4404C10.5093 22.51 8.81863 21.7816 9.05658 20.4766L10.1005 14.75H6.23627C5.21262 14.7499 4.62332 13.5864 5.22845 12.7607L12.706 2.55956L12.7822 2.46483Z"
                        fill="currentColor"
                      />
                    </svg>
                  </div>
                </div>
                <div class="toolbar-popover" data-menu="interactions">
                  <div class="icon-btn" aria-label="Interaction mode" title="Interactions">
                    <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                      <path
                        d="M12.75 14.7496L7.25003 20.2496C6.28357 21.216 4.7165 21.216 3.75003 20.2496C2.78392 19.2832 2.78377 17.716 3.75003 16.7496L9.25003 11.2496L12.75 14.7496Z"
                        fill="currentColor"
                      />
                      <path
                        d="M8.45801 2.16957C10.4591 1.85334 12.3266 1.96901 14.0284 2.5934C15.8473 3.26084 17.4231 4.48998 18.7481 6.2848C18.8565 6.43163 18.9411 6.54557 19.0332 6.71156C19.3835 7.3427 19.3853 8.0225 19.4063 8.45179C19.4299 8.93525 19.4718 9.20421 19.6407 9.43812C19.7337 9.56682 19.8374 9.66887 19.9815 9.80824H20.7129C20.9119 9.80824 21.1025 9.88816 21.2432 10.0289C21.3906 10.1765 21.5268 10.3116 21.6328 10.4323C21.7429 10.5575 21.8551 10.7045 21.9366 10.8883C22.1362 11.3393 22.1361 11.8543 21.9366 12.3053C21.8551 12.4891 21.7429 12.6361 21.6328 12.7614C21.5268 12.882 21.3906 13.0171 21.2432 13.1647L19.17 15.2418C19.0233 15.3887 18.8885 15.5239 18.7686 15.6295C18.6442 15.7392 18.498 15.8507 18.3155 15.9323C17.8615 16.135 17.3427 16.1349 16.8887 15.9323C16.7061 15.8507 16.56 15.7392 16.4356 15.6295C16.3157 15.5239 16.1808 15.3886 16.0342 15.2418C15.8938 15.1012 15.8145 14.9102 15.8145 14.7116C15.8144 14.1324 15.2831 13.699 14.7159 13.8161L13.9014 13.984C13.6543 14.035 13.3982 13.9583 13.2198 13.7799L10.2198 10.7799C10.0464 10.6065 9.96861 10.3592 10.0117 10.1178C10.2697 8.67741 10.2014 7.65821 9.85156 6.85316C9.50444 6.0544 8.83148 5.35521 7.65039 4.65199C7.30858 4.44846 7.06662 4.09707 7.01172 3.69203L7 3.51625L7.00488 3.40199C7.05443 2.83698 7.46895 2.34762 8.05664 2.2389L8.45801 2.16957Z"
                        fill="currentColor"
                      />
                    </svg>
                  </div>
                </div>
              </div>

              <div class="toolbar-menus" aria-hidden="true">
                <div class="popover-anchor" data-menu="simulation">
                  <div class="popover" id="popover-simulation">
                    <div class="popover-section">
                      <div class="popover-label">Spin speed</div>
                      <div class="popover-row">
                        <input type="range" id="spin-speed" min="5" max="100" value="25" step="1" />
                        <span class="popover-value" id="spin-value">25 rad/s</span>
                      </div>
                    </div>
                    <div class="popover-section">
                      <div class="popover-label">Friction</div>
                      <div class="popover-row">
                        <input type="range" id="friction" min="0" max="100" value="74" step="1" />
                        <span class="popover-value" id="friction-value">—</span>
                      </div>
                    </div>
                    <label class="popover-check">
                      <input type="checkbox" id="gravity" checked />
                      Gravity
                    </label>
                    <label class="popover-check">
                      <input type="checkbox" id="vectors" checked />
                      Show vectors
                    </label>
                  </div>
                </div>
                <div class="popover-anchor" data-menu="interactions">
                  <div class="popover popover-wide" id="popover-interactions">
                    <div class="interaction-modes" role="tablist" aria-label="Interaction modes">
                      <button type="button" class="mode-btn active" data-mode="tilt" title="Tilt">
                        <svg viewBox="0 0 16 16" aria-hidden="true">
                          <path d="M5 11.5V6l3-3.5 3 3.5v5.5" fill="none" stroke="currentColor" stroke-width="1.25" stroke-linecap="round" stroke-linejoin="round" />
                        </svg>
                        <span>Tilt</span>
                      </button>
                      <button type="button" class="mode-btn" data-mode="bump" title="Table bump">
                        <svg viewBox="0 0 16 16" aria-hidden="true">
                          <circle cx="8" cy="8" r="5.5" fill="none" stroke="currentColor" stroke-width="1.25" />
                          <path d="M8 2.5v2M8 11.5v2M2.5 8h2M11.5 8h2" fill="none" stroke="currentColor" stroke-width="1.25" stroke-linecap="round" />
                        </svg>
                        <span>Bump</span>
                      </button>
                      <button type="button" class="mode-btn" data-mode="wind" title="Wind">
                        <svg viewBox="0 0 16 16" aria-hidden="true">
                          <path d="M2.5 5.5h7a2 2 0 1 0 0-4M2.5 10.5h9a2.2 2.2 0 1 1 0 4.4" fill="none" stroke="currentColor" stroke-width="1.25" stroke-linecap="round" />
                        </svg>
                        <span>Wind</span>
                      </button>
                      <button type="button" class="mode-btn" data-mode="trace" title="Trace path">
                        <svg viewBox="0 0 16 16" aria-hidden="true">
                          <path d="M2.5 12.5c2-4 4-6 6-8.5 1.5-1.8 3-2.5 5-2" fill="none" stroke="currentColor" stroke-width="1.25" stroke-linecap="round" />
                        </svg>
                        <span>Trace</span>
                      </button>
                    </div>
                    <p class="interaction-hint" id="interaction-hint">Drag the top to tilt it.</p>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>

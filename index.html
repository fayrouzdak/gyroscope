<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spinning Top</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="app">
      <canvas id="canvas"></canvas>
      <div id="hud">
        <h1>Spinning Top</h1>
        <p class="hint">
          Click Spin to start · Drag to tilt · Right-drag to orbit camera
        </p>
        <div class="stats" id="stats"></div>
        <div class="controls">
          <button id="spin" class="primary">Spin</button>
          <label>
            Spin speed
            <input type="range" id="spin-speed" min="20" max="200" value="80" step="1" />
            <span id="spin-value">80 rad/s</span>
          </label>
          <label>
            Gravity
            <input type="checkbox" id="gravity" checked />
          </label>
          <label>
            Show vectors
            <input type="checkbox" id="vectors" checked />
          </label>
          <button id="reset">Reset</button>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>

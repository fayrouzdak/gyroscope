<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gyroscope</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/src/style.css" />
  </head>

    <div id="app">
      <div id="canvas-frame">
        <canvas id="canvas"></canvas>
        <div class="stats" id="stats"></div>

        <div id="panel">
          <div class="panel-box">

                    />

                      d="M5.75 3C4.7835 3 4 3.7835 4 4.75V19.25C4 20.2165 4.7835 21 5.75 21H8.25C9.2165 21 10 20.2165 10 19.25V4.75C10 3.7835 9.2165 3 8.25 3H5.75Z"

                </div>
              </div>

              <div class="toolbar-menus" aria-hidden="true">
                <div class="popover-anchor" data-menu="simulation">
                  <div class="popover" id="popover-simulation">
                    <div class="popover-frost" aria-hidden="true"><canvas></canvas></div>
                    <div class="popover-surface">
                    <div class="popover-section">
                      <div class="popover-row">
                        <div class="popover-field">
                          <div class="popover-label">Speed</div>
                          <span class="popover-value" id="spin-value">25 rad/s</span>
                        </div>
                        <input type="range" id="spin-speed" min="5" max="100" value="25" step="1" />
                      </div>
                    </div>
                    <div class="popover-section">
                      <div class="popover-row">
                        <div class="popover-field">
                          <div class="popover-label">Friction</div>

                        </div>
                        <input type="range" id="friction" min="0" max="100" value="74" step="1" />
                      </div>
                    </div>
                    <label class="popover-check">
                      <span class="popover-check-label">Gravity</span>
                      <span class="toggle">
                        <input type="checkbox" id="gravity" checked />
                        <span class="toggle-track" aria-hidden="true"></span>
                      </span>
                    </label>
                    <label class="popover-check">
                      <span class="popover-check-label">Vectors</span>
                      <span class="toggle">
                        <input type="checkbox" id="vectors" checked />
                        <span class="toggle-track" aria-hidden="true"></span>
                      </span>
                    </label>
                    </div>
                  </div>
                </div>
